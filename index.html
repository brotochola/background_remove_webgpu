<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background removal · WebGPU (HTML)</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --border: #2d3a4d;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }

    header p {
      margin: 0.35rem 0 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 1.25rem;
    }

    .result-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      background: var(--panel);
    }

    .result-card.err {
      border-color: var(--danger);
    }

    .result-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .result-name {
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-all;
      line-height: 1.35;
    }

    button.icon-btn {
      flex-shrink: 0;
      padding: 0.35rem 0.55rem;
      font-size: 0.85rem;
      line-height: 1;
      min-width: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    button.icon-btn:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--muted);
    }

    .card-error {
      font-size: 0.8rem;
      color: var(--danger);
      margin: 0.5rem 0 0;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    select,
    input[type="range"] {
      accent-color: var(--accent);
    }

    select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.65rem;
      font-size: 0.9rem;
    }

    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--panel);
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: var(--accent);
      background: #1e2a3d;
    }

    .dropzone p {
      margin: 0.35rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .dropzone strong {
      color: var(--text);
    }

    .hidden {
      display: none !important;
    }

    .progress-wrap {
      margin-top: 0.75rem;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }

    .progress-wrap.visible {
      display: block;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      transition: width 0.1s;
    }

    .status {
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.4em;
      margin-top: 0.75rem;
    }

    .status.error {
      color: var(--danger);
    }

    .preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    @media (max-width: 700px) {
      .preview {
        grid-template-columns: 1fr;
      }
    }

    .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .checker {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background-color: #ccc;
      background-image:
        linear-gradient(45deg, #bbb 25%, transparent 25%),
        linear-gradient(-45deg, #bbb 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #bbb 75%),
        linear-gradient(-45deg, transparent 75%, #bbb 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    .checker img,
    .checker canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 420px;
      object-fit: contain;
      vertical-align: middle;
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      background: #14532d;
      color: #86efac;
      margin-left: 0.35rem;
    }

    .badge.warn {
      background: #422006;
      color: #fdba74;
    }

    input[type="file"] {
      display: none;
    }

    details.card-matte-details {
      margin-top: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 1rem 1rem;
      background: var(--bg);
    }

    details.card-matte-details summary {
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      user-select: none;
    }

    details.card-matte-details summary::-webkit-details-marker {
      color: var(--muted);
    }

    .tuning-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.65rem 1.25rem;
      margin-top: 0.85rem;
    }

    .tuning-item label {
      display: block;
      margin-bottom: 0.25rem;
    }

    .tuning-item input[type="range"] {
      width: 100%;
      max-width: 280px;
      vertical-align: middle;
    }

    .tuning-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <header>
    <h1 title="Local background removal using Transformers.js; WebGPU or WASM, no server upload.">Remove background · WebGPU / WASM</h1>
    <p title="Open this page from an http:// or https:// URL so modules and model files load correctly (not file://).">
      Runs locally in your browser. Serve this folder over HTTP (see README).
      <span id="gpu-badge" class="badge hidden" title="Whether this browser exposes the WebGPU API. MODNet can use it when available; otherwise the app falls back to RMBG on the CPU."></span>
    </p>
  </header>
  <main>
    <div class="row">
      <div>
        <label
          for="model-select"
          title="Neural network that estimates foreground vs background. Changing it reloads weights on next run."
          >Model</label
        ><br />
        <select id="model-select">
          <option value="briaai/RMBG-1.4">RMBG-1.4 (WASM, compatible)</option>
        </select>
      </div>
    </div>

    <div
      class="dropzone"
      id="dropzone"
      tabindex="0"
      title="Add images to process. Files stay in your browser; nothing is uploaded to a server. Supports drag-and-drop or click to pick files."
    >
      <strong>Drop one or more images here</strong>
      <p>or click to choose · JPG, PNG, WebP (multiple files allowed)</p>
      <input
        type="file"
        id="file-input"
        accept="image/*"
        multiple
        title="Choose one or more images. The same formats as the drop zone."
      />
    </div>
    <div
      class="progress-wrap"
      id="progress-wrap"
      title="Progress while the AI model is downloading or loading into memory (first visit can take a while)."
    >
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="status" id="status" title="Messages about loading, processing, and errors."></div>

    <section id="result-section" class="hidden" title="Processed images appear here with previews and per-image matte controls.">
      <div id="results-list" class="results-list" title="Stack of results; each row is one processed image with its own controls."></div>
      <div class="actions">
        <button
          type="button"
          class="secondary"
          id="btn-clear"
          title="Remove every result from the list and free preview URLs. Does not delete files on your computer."
        >
          Clear all
        </button>
      </div>
    </section>
  </main>

  <script type="module">
    import { env, AutoModel, AutoProcessor, RawImage } from "https://esm.sh/@huggingface/transformers@3.8.1";

    const WEBGPU_MODEL_ID = "Xenova/modnet";
    const FALLBACK_MODEL_ID = "briaai/RMBG-1.4";

    const state = {
      model: null,
      processor: null,
      currentModelId: FALLBACK_MODEL_ID,
      isIOS: (() => {
        return (
          ["iPad Simulator", "iPhone Simulator", "iPod Simulator", "iPad", "iPhone", "iPod"].includes(navigator.platform) ||
          (navigator.userAgent.includes("Mac") && "ontouchend" in document)
        );
      })(),
    };

    const el = {
      dropzone: document.getElementById("dropzone"),
      fileInput: document.getElementById("file-input"),
      modelSelect: document.getElementById("model-select"),
      progressWrap: document.getElementById("progress-wrap"),
      progressBar: document.getElementById("progress-bar"),
      status: document.getElementById("status"),
      gpuBadge: document.getElementById("gpu-badge"),
      resultSection: document.getElementById("result-section"),
      resultsList: document.getElementById("results-list"),
      btnClear: document.getElementById("btn-clear"),
    };

    /** @type {WeakMap<Element, { maskSnapshot: { data: Float32Array, dims: number[] }, matte: Object, imgEl: HTMLImageElement, canvasEl: HTMLCanvasElement }>} */
    const cardState = new WeakMap();

    /**
     * Matte controls placed under each result preview. Hidden until inference succeeds.
     * @param {() => void} onMatteInput
     */
    function createCardMatteSection(onMatteInput) {
      const details = document.createElement("details");
      details.className = "card-matte-details";
      details.open = true;
      details.hidden = true;
      details.title =
        "Post-processing for this image only. Uses the cached mask from the model; sliders do not re-run inference.";

      const summary = document.createElement("summary");
      summary.textContent = "Matte tuning";
      summary.title = "Show or hide controls that remap the model’s soft mask into transparency (levels, contrast, gamma, feather).";

      const hint = document.createElement("p");
      hint.className = "tuning-hint";
      hint.textContent = "Adjust the cutout above live. Order: levels → contrast → gamma → feather.";
      hint.title =
        "Processing order: alpha black/white (levels), then matte contrast, then gamma, then edge feather on the alpha channel.";

      const grid = document.createElement("div");
      grid.className = "tuning-grid";

      /**
       * @param {string} labelText
       * @param {number} min
       * @param {number} max
       * @param {number} step
       * @param {number} def
       * @param {string} [tooltip]
       */
      function addRow(labelText, min, max, step, def, tooltip) {
        const wrap = document.createElement("div");
        wrap.className = "tuning-item";
        const lab = document.createElement("label");
        const span = document.createElement("span");
        span.className = "matte-val";
        lab.append(labelText + " ", span);
        const input = document.createElement("input");
        input.type = "range";
        input.min = String(min);
        input.max = String(max);
        input.step = String(step);
        input.value = String(def);
        if (tooltip) {
          wrap.title = tooltip;
          lab.title = tooltip;
          input.title = tooltip;
        }
        wrap.append(lab, input);
        grid.appendChild(wrap);
        return { input, span };
      }

      const rowBlack = addRow(
        "Alpha black level:",
        0,
        0.45,
        0.01,
        0,
        "Maps the dark end of the matte (like Photoshop Levels black point). Increase to push faint background pixels toward fully transparent and reduce gray halos. Applied first among these sliders."
      );
      const rowWhite = addRow(
        "Alpha white level:",
        0.55,
        1,
        0.01,
        1,
        "Maps the bright end of the matte (white point). Decrease to keep more semi-transparent pixels at edges (softer hair or fringe). Must stay above the black level."
      );
      const rowContrast = addRow(
        "Matte contrast:",
        0.5,
        2,
        0.05,
        1,
        "Stretches alpha values away from mid-gray: above 1 = harder subject/background separation; below 1 = softer transition. 1.0 leaves contrast unchanged."
      );
      const rowGamma = addRow(
        "Preserve foreground (gamma):",
        0.35,
        1.25,
        0.05,
        0.75,
        "Power curve on opacity after levels and contrast. Below 1 slightly weakens foreground opacity; above 1 strengthens it. Does not re-run the neural network."
      );
      const rowFeather = addRow(
        "Edge feather (px):",
        0,
        12,
        1,
        0,
        "Blurs only the alpha channel by this radius (pixels) to soften jagged edges. 0 = no blur. Heavier values can make fine detail look softer."
      );

      function getMatteOptions() {
        let black = Number(rowBlack.input.value);
        let white = Number(rowWhite.input.value);
        if (white <= black + 0.02) white = black + 0.02;
        return {
          maskGamma: Number(rowGamma.input.value),
          alphaBlack: black,
          alphaWhite: Math.min(1, white),
          alphaContrast: Number(rowContrast.input.value),
          featherPx: Number(rowFeather.input.value),
        };
      }

      function syncLabels() {
        rowBlack.span.textContent = Number(rowBlack.input.value).toFixed(2);
        rowWhite.span.textContent = Number(rowWhite.input.value).toFixed(2);
        rowContrast.span.textContent = Number(rowContrast.input.value).toFixed(2);
        rowGamma.span.textContent = Number(rowGamma.input.value).toFixed(2);
        rowFeather.span.textContent = String(rowFeather.input.value);
      }

      details.append(summary, hint, grid);

      [rowBlack, rowWhite, rowContrast, rowGamma, rowFeather].forEach(({ input }) => {
        input.addEventListener("input", () => {
          syncLabels();
          onMatteInput();
        });
      });
      syncLabels();

      return {
        root: details,
        getMatteOptions,
        show() {
          details.hidden = false;
        },
      };
    }

    /**
     * @param {HTMLImageElement} img
     * @returns {Promise<void>}
     */
    function waitForImageDecode(img) {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise((resolve, reject) => {
        img.onload = () => resolve();
        img.onerror = () => reject(new Error("Could not load image preview."));
      });
    }

    /**
     * @param {Float32Array | Uint8Array | number[]} maskFlat
     * @returns {Float32Array}
     */
    function copyMaskData(maskFlat) {
      const len = maskFlat.length;
      const out = new Float32Array(len);
      if (maskFlat instanceof Float32Array) {
        out.set(maskFlat);
      } else {
        for (let i = 0; i < len; i++) out[i] = maskFlat[i];
      }
      return out;
    }

    function setStatus(msg, isError = false) {
      el.status.textContent = msg || "";
      el.status.classList.toggle("error", isError);
    }

    function setProgress(p) {
      if (p == null) {
        el.progressBar.style.width = "0%";
        el.progressWrap.classList.remove("visible");
        return;
      }
      const pct = Math.round(p * 100);
      el.progressBar.style.width = pct + "%";
      el.progressWrap.classList.toggle("visible", p < 1);
    }

    /** @returns {Promise<boolean>} */
    async function initializeWebGPU() {
      const gpu = navigator.gpu;
      if (!gpu) return false;
      try {
        const adapter = await gpu.requestAdapter();
        if (!adapter) return false;

        env.allowLocalModels = false;
        if (env.backends?.onnx?.wasm) env.backends.onnx.wasm.proxy = false;
        await new Promise((r) => setTimeout(r, 100));

        state.model = await AutoModel.from_pretrained(WEBGPU_MODEL_ID, {
          device: "webgpu",
          config: { model_type: "modnet", architectures: ["MODNet"] },
          progress_callback: setProgress,
        });
        state.processor = await AutoProcessor.from_pretrained(WEBGPU_MODEL_ID, {
          progress_callback: setProgress,
        });
        state.currentModelId = WEBGPU_MODEL_ID;
        return true;
      } catch (e) {
        console.error("WebGPU init failed:", e);
        state.model = null;
        state.processor = null;
        return false;
      }
    }

    /**
     * @param {string | undefined} forceModelId
     * @returns {Promise<boolean>}
     */
    async function initializeModel(forceModelId) {
      const selected = forceModelId || el.modelSelect.value || FALLBACK_MODEL_ID;

      if (state.isIOS) {
        env.allowLocalModels = false;
        if (env.backends?.onnx?.wasm) env.backends.onnx.wasm.proxy = true;

        state.model = await AutoModel.from_pretrained(FALLBACK_MODEL_ID, {
          config: { model_type: "custom" },
          progress_callback: setProgress,
        });
        state.processor = await AutoProcessor.from_pretrained(FALLBACK_MODEL_ID, {
          config: {
            do_normalize: true,
            do_pad: false,
            do_rescale: true,
            do_resize: true,
            image_mean: [0.5, 0.5, 0.5],
            feature_extractor_type: "ImageFeatureExtractor",
            image_std: [1, 1, 1],
            resample: 2,
            rescale_factor: 0.00392156862745098,
            size: { width: 1024, height: 1024 },
          },
          progress_callback: setProgress,
        });
        state.currentModelId = FALLBACK_MODEL_ID;
        return true;
      }

      if (selected === WEBGPU_MODEL_ID) {
        const ok = await initializeWebGPU();
        if (ok) return true;
        setStatus("WebGPU unavailable or MODNet failed; using RMBG-1.4 (WASM).", false);
      }

      env.allowLocalModels = false;
      if (env.backends?.onnx?.wasm) env.backends.onnx.wasm.proxy = true;

      state.model = await AutoModel.from_pretrained(FALLBACK_MODEL_ID, {
        progress_callback: setProgress,
      });
      state.processor = await AutoProcessor.from_pretrained(FALLBACK_MODEL_ID, {
        revision: "main",
        config: {
          do_normalize: true,
          do_pad: true,
          do_rescale: true,
          do_resize: true,
          image_mean: [0.5, 0.5, 0.5],
          feature_extractor_type: "ImageFeatureExtractor",
          image_std: [0.5, 0.5, 0.5],
          resample: 2,
          rescale_factor: 0.00392156862745098,
          size: { width: 1024, height: 1024 },
        },
        progress_callback: setProgress,
      });
      state.currentModelId = FALLBACK_MODEL_ID;
      if (el.modelSelect.value === WEBGPU_MODEL_ID) {
        el.modelSelect.value = FALLBACK_MODEL_ID;
      }
      return true;
    }

    /**
     * WebGPU outputs often stay on GPU until `getData()`; reading `.data` before that throws.
     * @param {any} tensor
     */
    async function ensureMaskTensorOnCpu(tensor) {
      if (tensor && typeof tensor.getData === "function") {
        await tensor.getData();
      }
      return tensor;
    }

    /**
     * Separable box blur on alpha (0–255). Uses prefix sums; window shortens at edges.
     * @param {Uint8ClampedArray} out
     * @param {number} w
     * @param {number} h
     * @param {number} r
     */
    function featherAlphaChannel(out, w, h, r) {
      if (r <= 0) return;
      const n = w * h;
      const f = new Float32Array(n);
      for (let i = 0; i < n; i++) f[i] = out[i];
      const tmp = new Float32Array(n);
      for (let y = 0; y < h; y++) {
        const row = y * w;
        const P = new Float64Array(w + 1);
        for (let x = 0; x < w; x++) P[x + 1] = P[x] + f[row + x];
        for (let x = 0; x < w; x++) {
          const x0 = Math.max(0, x - r);
          const x1 = Math.min(w - 1, x + r);
          tmp[row + x] = (P[x1 + 1] - P[x0]) / (x1 - x0 + 1);
        }
      }
      for (let x = 0; x < w; x++) {
        const P = new Float64Array(h + 1);
        for (let y = 0; y < h; y++) P[y + 1] = P[y] + tmp[y * w + x];
        for (let y = 0; y < h; y++) {
          const y0 = Math.max(0, y - r);
          const y1 = Math.min(h - 1, y + r);
          const s = (P[y1 + 1] - P[y0]) / (y1 - y0 + 1);
          out[y * w + x] = Math.max(0, Math.min(255, Math.round(s)));
        }
      }
    }

    /**
     * @typedef {Object} MattePostOptions
     * @property {number} [maskGamma=1]
     * @property {number} [alphaBlack=0]
     * @property {number} [alphaWhite=1]
     * @property {number} [alphaContrast=1]
     * @property {number} [featherPx=0]
     */

    /**
     * @param {Float32Array | Uint8Array | number[]} maskFlat
     * @param {number[]} dims
     * @param {number} destW
     * @param {number} destH
     * @param {MattePostOptions} post
     */
    function sampleMaskToAlpha(maskFlat, dims, destW, destH, post) {
      const {
        maskGamma = 1,
        alphaBlack = 0,
        alphaWhite = 1,
        alphaContrast = 1,
        featherPx = 0,
      } = post;

      let lo = alphaBlack;
      let hi = alphaWhite;
      if (hi <= lo + 1e-6) hi = lo + 1e-6;

      let mh;
      let mw;
      let base = 0;
      if (dims.length === 4) {
        const c = dims[1];
        mh = dims[2];
        mw = dims[3];
        if (c > 1) base = (c - 1) * mh * mw;
      } else if (dims.length === 3) {
        mh = dims[1];
        mw = dims[2];
      } else if (dims.length === 2) {
        mh = dims[0];
        mw = dims[1];
      } else {
        throw new Error("Unsupported mask shape: " + JSON.stringify(dims));
      }

      const spatial = mh * mw;
      let mn = Infinity;
      let mx = -Infinity;
      for (let i = 0; i < spatial; i++) {
        const v = maskFlat[base + i];
        if (v < mn) mn = v;
        if (v > mx) mx = v;
      }
      const needsMinMax = mx > 1.25 || mn < -0.25;

      const outAlphas = new Uint8ClampedArray(destW * destH);
      for (let i = 0; i < destH; i++) {
        for (let j = 0; j < destW; j++) {
          const sx = Math.min(mw - 1, Math.floor((j / destW) * mw));
          const sy = Math.min(mh - 1, Math.floor((i / destH) * mh));
          const idx = base + sy * mw + sx;
          let v = maskFlat[idx];
          if (needsMinMax) {
            v = (v - mn) / (mx - mn + 1e-8);
          } else if (v >= 0 && v <= 1) {
            /* probability / matte */
          } else if (v > 1 && v <= 255) {
            v = v / 255;
          } else {
            v = 1 / (1 + Math.exp(-v));
          }
          let a = Math.max(0, Math.min(1, v));
          a = (a - lo) / (hi - lo);
          a = Math.max(0, Math.min(1, a));
          if (alphaContrast !== 1) {
            a = Math.max(0, Math.min(1, 0.5 + (a - 0.5) * alphaContrast));
          }
          if (maskGamma !== 1 && a > 0) a = Math.pow(a, maskGamma);
          outAlphas[i * destW + j] = Math.round(a * 255);
        }
      }
      featherAlphaChannel(outAlphas, destW, destH, featherPx);
      return outAlphas;
    }

    /**
     * @param {File} file
     */
    async function inferMaskOnly(file) {
      if (!state.model || !state.processor) {
        throw new Error("Model not initialized.");
      }

      const objectUrl = URL.createObjectURL(file);
      const img = await RawImage.fromURL(objectUrl);
      URL.revokeObjectURL(objectUrl);

      const { pixel_values } = await state.processor(img);
      const out = await state.model({ input: pixel_values });
      const raw = out.output ?? out.logits ?? out.prediction;
      let maskTensor = Array.isArray(raw) ? raw[0] : raw;
      if (!maskTensor) {
        throw new Error("Unexpected model output (no mask tensor).");
      }

      await ensureMaskTensorOnCpu(maskTensor);
      const maskFlat = maskTensor.data;
      if (!maskFlat || !maskTensor.dims) {
        throw new Error("Could not read mask (WebGPU tensor not on CPU?).");
      }

      return {
        maskSnapshot: {
          data: copyMaskData(maskFlat),
          dims: Array.from(maskTensor.dims),
        },
        width: img.width,
        height: img.height,
      };
    }

    /**
     * @param {{ data: Float32Array, dims: number[] }} maskSnapshot
     * @param {MattePostOptions} matte
     * @param {HTMLImageElement} imgEl
     * @param {HTMLCanvasElement} canvasEl
     */
    function paintCutout(maskSnapshot, matte, imgEl, canvasEl) {
      const w = imgEl.naturalWidth;
      const h = imgEl.naturalHeight;
      if (!w || !h) return;
      const maskAlphas = sampleMaskToAlpha(maskSnapshot.data, maskSnapshot.dims, w, h, matte);
      canvasEl.width = w;
      canvasEl.height = h;
      const ctx = canvasEl.getContext("2d", { willReadFrequently: true });
      if (!ctx) throw new Error("Could not get 2D canvas context");
      ctx.drawImage(imgEl, 0, 0);
      const pixelData = ctx.getImageData(0, 0, w, h);
      for (let i = 0; i < maskAlphas.length; ++i) {
        pixelData.data[4 * i + 3] = maskAlphas[i];
      }
      ctx.putImageData(pixelData, 0, 0);
    }

    /**
     * @param {File} file
     */
    function createResultCard(file) {
      const card = document.createElement("div");
      card.className = "result-card";

      const head = document.createElement("div");
      head.className = "result-card-head";

      const name = document.createElement("span");
      name.className = "result-name";
      name.textContent = file.name;
      name.title = file.name;

      const btnClose = document.createElement("button");
      btnClose.type = "button";
      btnClose.className = "icon-btn";
      btnClose.setAttribute("aria-label", "Remove this image");
      btnClose.title = "Remove this result from the list. Does not delete the file on disk.";
      btnClose.textContent = "✕";

      head.append(name, btnClose);

      const preview = document.createElement("div");
      preview.className = "preview";
      preview.title = "Side-by-side original and cutout. Resize the window to reflow on small screens.";

      const colOrig = document.createElement("div");
      const colCut = document.createElement("div");
      const tOrig = document.createElement("div");
      tOrig.className = "panel-title";
      tOrig.textContent = "Original";
      tOrig.title = "Source image preview (RGB only in this panel).";
      const tCut = document.createElement("div");
      tCut.className = "panel-title";
      tCut.textContent = "Cutout (PNG)";
      tCut.title = "Foreground with alpha; checkerboard shows transparency.";
      const checkOrig = document.createElement("div");
      checkOrig.className = "checker";
      checkOrig.title = "Original pixels on a neutral grid (no transparency here).";
      const checkCut = document.createElement("div");
      checkCut.className = "checker";
      checkCut.title = "Transparency preview: gray squares show where pixels are see-through.";
      const imgEl = document.createElement("img");
      imgEl.alt = "Original";
      imgEl.title = "Full-size preview loads from your file in the browser.";
      const canvasEl = document.createElement("canvas");
      canvasEl.title = "Cutout with alpha. Matte sliders below update this canvas without re-running the model.";
      checkOrig.appendChild(imgEl);
      checkCut.appendChild(canvasEl);
      colOrig.append(tOrig, checkOrig);
      colCut.append(tCut, checkCut);
      preview.append(colOrig, colCut);

      const errP = document.createElement("p");
      errP.className = "card-error";
      errP.hidden = true;
      errP.title = "Error message from loading or running the model on this file.";

      const actions = document.createElement("div");
      actions.className = "actions";
      const btnDl = document.createElement("button");
      btnDl.type = "button";
      btnDl.textContent = "Download PNG";
      btnDl.title = "Save this cutout as a PNG with an alpha channel (transparency). Filename ends with -no-bg.png.";

      actions.appendChild(btnDl);

      /** @type {{ root: HTMLDetailsElement, getMatteOptions: () => object, show: () => void }} */
      let matteUi;
      const applyMatteForCard = () => {
        const st = cardState.get(card);
        if (!st?.maskSnapshot) return;
        const matte = matteUi.getMatteOptions();
        st.matte = matte;
        try {
          paintCutout(st.maskSnapshot, matte, st.imgEl, st.canvasEl);
        } catch (e) {
          console.error(e);
        }
      };

      matteUi = createCardMatteSection(applyMatteForCard);

      card.append(head, preview, matteUi.root, errP, actions);

      /** @type {string | null} */
      let previewUrl = null;

      function revokePreview() {
        if (previewUrl) {
          URL.revokeObjectURL(previewUrl);
          previewUrl = null;
        }
      }

      btnClose.addEventListener("click", (e) => {
        e.stopPropagation();
        cardState.delete(card);
        revokePreview();
        card.remove();
        if (!el.resultsList.children.length) {
          el.resultSection.classList.add("hidden");
        }
      });

      btnDl.addEventListener("click", () => {
        canvasEl.toBlob(
          (blob) => {
            if (!blob) return;
            const a = document.createElement("a");
            const base = file.name.replace(/\.[^.]+$/, "");
            a.download = base + "-no-bg.png";
            a.href = URL.createObjectURL(blob);
            a.click();
            URL.revokeObjectURL(a.href);
          },
          "image/png",
          1
        );
      });

      return {
        card,
        canvasEl,
        imgEl,
        errP,
        matteUi,
        setPreviewSrc(url) {
          revokePreview();
          previewUrl = url;
          imgEl.src = url;
        },
      };
    }

    function populateModelSelect() {
      const hasGpu = Boolean(navigator.gpu);
      el.gpuBadge.textContent = hasGpu ? "WebGPU: available" : "WebGPU: not detected";
      el.gpuBadge.className = "badge" + (hasGpu ? "" : " warn");
      el.gpuBadge.classList.remove("hidden");

      el.modelSelect.innerHTML = "";
      el.modelSelect.title =
        "Pick which model produces the segmentation mask. MODNet uses the GPU when available (faster). RMBG-1.4 runs via WebAssembly on the CPU and works on more devices. Changing selection reloads the model the next time you process images.";

      const optRmbg = document.createElement("option");
      optRmbg.value = FALLBACK_MODEL_ID;
      optRmbg.textContent = "RMBG-1.4 (WASM · compatible)";
      optRmbg.title = "BRIA RMBG 1.4: ONNX in WebAssembly, broad compatibility, runs on CPU.";
      el.modelSelect.appendChild(optRmbg);

      if (hasGpu && !state.isIOS) {
        const optMod = document.createElement("option");
        optMod.value = WEBGPU_MODEL_ID;
        optMod.textContent = "MODNet (WebGPU)";
        optMod.title = "MODNet via WebGPU: typically faster on discrete or integrated GPUs when supported.";
        el.modelSelect.appendChild(optMod);
      }

      el.modelSelect.value = hasGpu && !state.isIOS ? WEBGPU_MODEL_ID : FALLBACK_MODEL_ID;
    }

    async function ensureModelForSelection() {
      const wanted = el.modelSelect.value;
      if (state.model && state.processor && state.currentModelId === wanted) return;

      setStatus("Loading model (first run may take a while and download ~100 MB)…");
      setProgress(0);
      el.progressWrap.classList.add("visible");

      try {
        state.model = null;
        state.processor = null;
        await initializeModel(wanted);
        setProgress(1);
        setStatus("Model ready: " + state.currentModelId);
      } catch (err) {
        console.error(err);
        setProgress(null);
        setStatus(err?.message || String(err), true);
        throw err;
      } finally {
        setTimeout(() => setProgress(null), 400);
      }
    }

    /**
     * @param {File[]} files
     */
    async function runPipeline(files) {
      const list = files.filter((f) => f.type.startsWith("image/"));
      if (!list.length) return;

      await ensureModelForSelection();

      el.resultSection.classList.remove("hidden");

      const n = list.length;
      for (let i = 0; i < n; i++) {
        const file = list[i];
        setStatus(n > 1 ? `Processing ${i + 1} / ${n}…` : "Processing…");

        const ui = createResultCard(file);
        el.resultsList.appendChild(ui.card);
        ui.setPreviewSrc(URL.createObjectURL(file));

        try {
          await waitForImageDecode(ui.imgEl);
          const infer = await inferMaskOnly(file);
          const matte = ui.matteUi.getMatteOptions();
          if (infer.width !== ui.imgEl.naturalWidth || infer.height !== ui.imgEl.naturalHeight) {
            console.warn("Preview dimensions differ from model input; using preview size for cutout.");
          }
          cardState.set(ui.card, {
            maskSnapshot: infer.maskSnapshot,
            matte: { ...matte },
            imgEl: ui.imgEl,
            canvasEl: ui.canvasEl,
          });
          paintCutout(infer.maskSnapshot, matte, ui.imgEl, ui.canvasEl);
          ui.matteUi.show();
        } catch (err) {
          console.error(err);
          ui.card.classList.add("err");
          ui.errP.textContent = err?.message || String(err);
          ui.errP.hidden = false;
        }
      }

      setStatus(`Done · ${n} image(s) · ${state.currentModelId}`);
    }

    el.dropzone.addEventListener("click", () => el.fileInput.click());
    el.dropzone.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        el.fileInput.click();
      }
    });

    el.fileInput.addEventListener("change", () => {
      const files = el.fileInput.files;
      if (files?.length) {
        runPipeline(Array.from(files)).catch((err) => {
          console.error(err);
          setStatus(err?.message || String(err), true);
        });
      }
      el.fileInput.value = "";
    });

    ["dragenter", "dragover", "dragleave", "drop"].forEach((ev) => {
      el.dropzone.addEventListener(ev, (e) => {
        e.preventDefault();
        e.stopPropagation();
      });
    });
    el.dropzone.addEventListener("dragover", () => el.dropzone.classList.add("dragover"));
    el.dropzone.addEventListener("dragleave", () => el.dropzone.classList.remove("dragover"));
    el.dropzone.addEventListener("drop", (e) => {
      el.dropzone.classList.remove("dragover");
      const dt = e.dataTransfer?.files;
      if (dt?.length) {
        runPipeline(Array.from(dt)).catch((err) => {
          console.error(err);
          setStatus(err?.message || String(err), true);
        });
      }
    });

    el.modelSelect.addEventListener("change", () => {
      state.model = null;
      state.processor = null;
      setStatus("Model changed. Process the image again.");
    });

    el.btnClear.addEventListener("click", () => {
      el.resultsList.querySelectorAll(".result-card img[src^='blob:']").forEach((img) => {
        try {
          URL.revokeObjectURL(img.src);
        } catch (_) { }
      });
      el.resultsList.innerHTML = "";
      el.resultSection.classList.add("hidden");
      setStatus("");
    });

    populateModelSelect();
    setStatus("Optional: pick a model, then add images. Matte sliders appear under each result.");
  </script>
</body>
</html>
